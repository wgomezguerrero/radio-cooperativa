<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Taxi - Frecuencia Directa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-principal: #121214;
            --bg-tarjeta: #1a1a1e;
            --co-primario: #f39c12;
            --co-exito: #2ecc71;
            --co-transmision: #e74c3c;
            --co-texto: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-principal); color: var(--co-texto); display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

        .navbar-superior { width: 100%; background-color: #1a1a1e; padding: 15px 20px; display: flex; align-items: center; border-bottom: 2px solid #2d2d35; z-index: 100; }
        .btn-retroceder { color: var(--co-texto); font-size: 1.3rem; margin-right: 15px; cursor: pointer; background: none; border: none; }
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .display-radio { width: 100%; background: #0d1b10; border: 3px solid #2d2d35; border-radius: 12px; padding: 15px; text-align: center; border-left: 5px solid var(--co-primario); }
        .display-frecuencia { font-family: 'Orbitron', sans-serif; color: #39ff14; font-size: 1.5rem; }
        
        .btn-ptt { width: 200px; height: 200px; background: linear-gradient(135deg, #2c2c35, #1a1a24); border: 8px solid #3a3a45; border-radius: 50%; color: #fff; font-size: 3rem; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); touch-action: none; }
        .btn-ptt.transmitiendo { border-color: var(--co-transmision); background: #c0392b; box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
        .btn-ptt.recibiendo { border-color: var(--co-exito); background: #27ae60; }
        
        .info-transmision { background: var(--bg-tarjeta); width: 100%; padding: 15px; border-radius: 12px; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="navbar-superior">
    <button class="btn-retroceder" onclick="volverAtras()"><i class="fa-solid fa-arrow-left"></i></button>
    <div style="font-weight: 600;">FRECUENCIA DE RADIO</div>
</div>

<div class="main-content">
    <div class="container">
        <div class="display-radio">
            <div class="display-frecuencia">CANAL-01 CH</div>
            <div id="lblEstadoConexion" style="font-size: 0.8rem; margin-top: 5px;">INICIANDO...</div>
        </div>
        <button id="btnPttRadio" class="btn-ptt" disabled>
            <i class="fa-solid fa-microphone"></i>
            <span style="font-size: 0.8rem; margin-top: 5px;" id="txtBotonPtt">ESPERE</span>
        </button>
        <div class="info-transmision" id="lblQuienHabla">Sincronizando...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
  apiKey: "AIzaSyBT57itkr-WcslebPzggdinoPGqrJTUzGE",
  authDomain: "taxivellavega.firebaseapp.com",
  databaseURL: "https://taxivellavega-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "taxivellavega",
  storageBucket: "taxivellavega.firebasestorage.app",
  messagingSenderId: "627311271806",
  appId: "1:627311271806:web:30961d837fe32fa1ae9d2f"
};
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    
    let streamMicrofono = null;
    let grabadorNativo = null;
    let fragmentos = [];
    let estaTransmitiendo = false;
    let ultimoAudioTimestamp = 0;
    const btnPtt = document.getElementById('btnPttRadio');

    window.onload = async () => {
        try {
            streamMicrofono = await navigator.mediaDevices.getUserMedia({ audio: true });
            btnPtt.disabled = false;
            document.getElementById('txtBotonPtt').innerText = "PULSAR";
            document.getElementById('lblEstadoConexion').innerText = "ONLINE";
        } catch(e) { document.getElementById('lblEstadoConexion').innerText = "ERROR DE MICRÓFONO"; }
        activarReceptor();
    };

    function activarReceptor() {
        db.ref('radio_frecuencia/canal_01').on('value', (snap) => {
            const data = snap.val();
            if (data?.audioBase64 && data.timestamp > ultimoAudioTimestamp && !estaTransmitiendo) {
                ultimoAudioTimestamp = data.timestamp;
                reproducirVozEntrante(data.audioBase64);
            }
        });
    }

    function reproducirVozEntrante(base64Data) {
        const audio = new Audio(base64Data);
        audio.play();
        document.getElementById('lblQuienHabla').innerText = "ESCUCHANDO...";
        audio.onended = () => document.getElementById('lblQuienHabla').innerText = "FRECUENCIA LIBRE";
    }

    btnPtt.onmousedown = btnPtt.ontouchstart = (e) => {
        e.preventDefault();
        estaTransmitiendo = true;
        fragmentos = [];
        btnPtt.classList.add('transmitiendo');
        grabadorNativo = new MediaRecorder(streamMicrofono);
        grabadorNativo.ondataavailable = e => fragmentos.push(e.data);
        grabadorNativo.onstop = () => {
            const blob = new Blob(fragmentos);
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => db.ref('radio_frecuencia/canal_01').set({ audioBase64: reader.result, timestamp: Date.now() });
        };
        grabadorNativo.start();
    };

    window.onmouseup = window.ontouchend = () => {
        if (!estaTransmitiendo) return;
        estaTransmitiendo = false;
        btnPtt.classList.remove('transmitiendo');
        if (grabadorNativo) grabadorNativo.stop();
    };

    function volverAtras() {
        window.location.href = "go:inicio";
    }
</script>
</body>
</html>
